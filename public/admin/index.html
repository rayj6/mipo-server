<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mipo Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1d23; color: #e4e6eb; min-height: 100vh; }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    h1 { font-size: 1.5rem; margin-bottom: 24px; color: #fff; }
    h2 { font-size: 1.15rem; margin-bottom: 12px; color: #b0b3b8; }
    .login-box { max-width: 360px; margin: 80px auto; padding: 32px; background: #24262b; border-radius: 12px; }
    .login-box input { width: 100%; padding: 10px 12px; margin-bottom: 12px; border: 1px solid #3e4048; border-radius: 6px; background: #18191c; color: #e4e6eb; font-size: 14px; }
    .login-box button { width: 100%; padding: 12px; background: #2d7dff; color: #fff; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
    .login-box button:hover { background: #4d8fff; }
    .error { color: #f25c5c; font-size: 13px; margin-bottom: 12px; }
    .nav { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
    .nav button { padding: 8px 16px; background: #2d3239; border: 1px solid #3e4048; border-radius: 6px; color: #e4e6eb; cursor: pointer; font-size: 14px; }
    .nav button:hover { background: #3d4249; }
    .nav button.active { background: #2d7dff; border-color: #2d7dff; }
    section { display: none; }
    section.visible { display: block; }
    table { width: 100%; border-collapse: collapse; background: #24262b; border-radius: 8px; overflow: hidden; }
    th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #3e4048; }
    th { background: #2d3239; font-weight: 600; font-size: 12px; text-transform: uppercase; color: #b0b3b8; }
    tr:hover { background: #2d3239; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
    .badge.free { background: #1e3a2e; color: #6bcf7b; }
    .badge.paid { background: #3a2e1e; color: #ffb84d; }
    .btn { padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; }
    .btn-primary { background: #2d7dff; color: #fff; }
    .btn-primary:hover { background: #4d8fff; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 4px; font-size: 13px; color: #b0b3b8; }
    .form-group input, .form-group textarea { width: 100%; padding: 10px 12px; border: 1px solid #3e4048; border-radius: 6px; background: #18191c; color: #e4e6eb; font-size: 14px; font-family: inherit; }
    .form-group textarea { min-height: 120px; resize: vertical; }
    .form-group textarea.large { min-height: 320px; font-family: 'Monaco', 'Menlo', monospace; font-size: 12px; }
    .form-group .hint { font-size: 12px; color: #6c6e73; margin-top: 4px; }
    .form-actions { margin-top: 20px; display: flex; gap: 8px; }
    .config-list { background: #24262b; border-radius: 8px; padding: 16px; }
    .config-list dl { display: grid; grid-template-columns: 180px 1fr; gap: 8px 16px; font-size: 14px; }
    .config-list dt { color: #b0b3b8; }
    .config-list dd { margin: 0; word-break: break-all; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .header .user { font-size: 13px; color: #b0b3b8; }
    .header .logout { padding: 6px 12px; background: transparent; border: 1px solid #3e4048; color: #e4e6eb; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .header .logout:hover { background: #3e4048; }
  </style>
</head>
<body>
  <div id="loginView" class="login-box">
    <h1>Admin Login</h1>
    <p id="loginError" class="error" style="display:none;"></p>
    <input type="email" id="loginEmail" placeholder="Email" autocomplete="username">
    <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password">
    <button type="button" id="loginBtn">Sign in</button>
  </div>

  <div id="dashboardView" style="display:none;">
    <div class="container">
      <div class="header">
        <h1>Mipo Admin</h1>
        <div>
          <span class="user" id="userEmail"></span>
          <button type="button" class="logout" id="logoutBtn">Logout</button>
        </div>
      </div>
      <nav class="nav">
        <button type="button" data-section="templates" class="active">Templates</button>
        <button type="button" data-section="users">Users</button>
        <button type="button" data-section="config">Server config</button>
      </nav>

      <section id="section-templates" class="visible">
        <h2>Templates</h2>
        <div id="templatesList"></div>
        <div id="templateEdit" style="display:none;">
          <form id="templateForm">
            <input type="hidden" id="tplId">
            <div class="form-group">
              <label>Name</label>
              <input type="text" id="tplName" required>
            </div>
            <div class="form-group">
              <label>Slug (e.g. template_1)</label>
              <input type="text" id="tplSlug" required>
              <span class="hint">Used in URLs; alphanumeric and underscore only.</span>
            </div>
            <div class="form-group">
              <label>Slot count (1–4)</label>
              <input type="number" id="tplSlotCount" min="1" max="4" value="3">
            </div>
            <div class="form-group">
              <label>Slot options (JSON array, e.g. [1,2,3,4])</label>
              <input type="text" id="tplSlotOptions" value="[1,2,3,4]">
            </div>
            <div class="form-group">
              <label><input type="checkbox" id="tplIsFree" checked> Free (available to free plan)</label>
            </div>
            <div class="form-group">
              <label>Image path (e.g. /templates/images/template_1.png)</label>
              <input type="text" id="tplImagePath">
            </div>
            <div class="form-group">
              <label>HTML content</label>
              <textarea id="tplHtml" class="large" placeholder="Full HTML of the template..."></textarea>
            </div>
            <div class="form-group">
              <label>Extra CSS (injected before &lt;/head&gt;)</label>
              <textarea id="tplCss" placeholder="Optional additional CSS..."></textarea>
            </div>
            <div class="form-actions">
              <button type="submit" class="btn btn-primary">Save template</button>
              <button type="button" id="tplCancel" class="btn">Cancel</button>
            </div>
          </form>
        </div>
      </section>

      <section id="section-users">
        <h2>Users</h2>
        <div id="usersList"></div>
      </section>

      <section id="section-config">
        <h2>Server config</h2>
        <div id="configList" class="config-list"></div>
      </section>
    </div>
  </div>

  <script>
    const API = '';
    function getToken() { return localStorage.getItem('adminToken') || ''; }
    function setToken(t) { if (t) localStorage.setItem('adminToken', t); else localStorage.removeItem('adminToken'); }

    async function api(path, options = {}) {
      const url = (API || '') + path;
      const headers = { ...options.headers };
      if (getToken()) headers['Authorization'] = 'Bearer ' + getToken();
      if (options.body && typeof options.body === 'object' && !(options.body instanceof FormData)) {
        headers['Content-Type'] = 'application/json';
        options.body = JSON.stringify(options.body);
      }
      const res = await fetch(url, { ...options, headers });
      if (res.status === 401 || res.status === 403) { setToken(''); window.location.reload(); return; }
      return res;
    }

    function show(el) { el.style.display = 'block'; }
    function hide(el) { el.style.display = 'none'; }

    document.getElementById('loginBtn').addEventListener('click', async () => {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const errEl = document.getElementById('loginError');
      if (!email || !password) { errEl.textContent = 'Email and password required'; show(errEl); return; }
      errEl.style.display = 'none';
      try {
        const res = await fetch((API || '') + '/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) { errEl.textContent = data.error || 'Login failed'; show(errEl); return; }
        if (!data.token) { errEl.textContent = 'No token returned'; show(errEl); return; }
        setToken(data.token);
        const meRes = await api('/api/auth/me');
        const me = await meRes.json();
        if (!me.isAdmin) { setToken(''); errEl.textContent = 'Not an admin user'; show(errEl); return; }
        hide(document.getElementById('loginView'));
        show(document.getElementById('dashboardView'));
        document.getElementById('userEmail').textContent = me.email;
        loadTemplates(); loadUsers(); loadConfig();
      } catch (e) { errEl.textContent = e.message || 'Request failed'; show(errEl); }
    });

    document.getElementById('logoutBtn').addEventListener('click', () => { setToken(''); window.location.reload(); });

    document.querySelectorAll('.nav button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('#dashboardView section').forEach(s => s.classList.remove('visible'));
        btn.classList.add('active');
        const id = 'section-' + btn.dataset.section;
        document.getElementById(id).classList.add('visible');
      });
    });

    async function loadTemplates() {
      const res = await api('/api/admin/templates');
      if (!res || !res.ok) return;
      const list = await res.json();
      const html = list.length ? '<table><thead><tr><th>ID</th><th>Slug</th><th>Name</th><th>Slots</th><th>Free</th><th></th></tr></thead><tbody>' +
        list.map(t => '<tr><td>' + t.id + '</td><td>' + t.slug + '</td><td>' + t.name + '</td><td>' + t.slotCount + '</td><td><span class="badge ' + (t.isFree ? 'free' : 'paid') + '">' + (t.isFree ? 'Free' : 'Paid') + '</span></td><td><button type="button" class="btn btn-primary edit-tpl" data-id="' + t.id + '">Edit</button></td></tr>').join('') +
        '</tbody></table>' : '<p>No templates.</p>';
      document.getElementById('templatesList').innerHTML = html;
      document.getElementById('templatesList').querySelectorAll('.edit-tpl').forEach(b => {
        b.addEventListener('click', () => openTemplateEdit(parseInt(b.dataset.id, 10)));
      });
    }

    async function openTemplateEdit(id) {
      const res = await api('/api/admin/templates/' + id);
      if (!res || !res.ok) return;
      const t = await res.json();
      document.getElementById('tplId').value = t.id;
      document.getElementById('tplName').value = t.name;
      document.getElementById('tplSlug').value = t.slug;
      document.getElementById('tplSlotCount').value = t.slotCount;
      document.getElementById('tplSlotOptions').value = JSON.stringify(t.slotOptions || [1,2,3,4]);
      document.getElementById('tplIsFree').checked = t.isFree;
      document.getElementById('tplImagePath').value = t.imagePath || '';
      document.getElementById('tplHtml').value = t.htmlContent || '';
      document.getElementById('tplCss').value = t.cssContent || '';
      document.getElementById('templatesList').style.display = 'none';
      show(document.getElementById('templateEdit'));
    }

    document.getElementById('templateForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('tplId').value;
      let slotOptions;
      try { slotOptions = JSON.parse(document.getElementById('tplSlotOptions').value); } catch (_) { slotOptions = [1,2,3,4]; }
      const body = {
        name: document.getElementById('tplName').value.trim(),
        slug: document.getElementById('tplSlug').value.trim(),
        slotCount: parseInt(document.getElementById('tplSlotCount').value, 10) || 3,
        slotOptions,
        isFree: document.getElementById('tplIsFree').checked,
        imagePath: document.getElementById('tplImagePath').value.trim(),
        htmlContent: document.getElementById('tplHtml').value,
        cssContent: document.getElementById('tplCss').value,
      };
      const res = await api('/api/admin/templates/' + id, { method: 'PUT', body });
      if (!res || !res.ok) { const d = await res.json(); alert(d.error || 'Save failed'); return; }
      hide(document.getElementById('templateEdit'));
      document.getElementById('templatesList').style.display = 'block';
      loadTemplates();
    });

    document.getElementById('tplCancel').addEventListener('click', () => {
      hide(document.getElementById('templateEdit'));
      document.getElementById('templatesList').style.display = 'block';
    });

    async function loadUsers() {
      const res = await api('/api/admin/users');
      if (!res || !res.ok) return;
      const list = await res.json();
      const html = list.length ? '<table><thead><tr><th>ID</th><th>Email</th><th>Display name</th><th>Language</th><th>Admin</th><th>Created</th></tr></thead><tbody>' +
        list.map(u => '<tr><td>' + u.id + '</td><td>' + u.email + '</td><td>' + (u.displayName || '') + '</td><td>' + u.language + '</td><td>' + (u.isAdmin ? 'Yes' : '') + '</td><td>' + (u.createdAt || '') + '</td></tr>').join('') +
        '</tbody></table>' : '<p>No users.</p>';
      document.getElementById('usersList').innerHTML = html;
    }

    async function loadConfig() {
      const res = await api('/api/admin/config');
      if (!res || !res.ok) return;
      const c = await res.json();
      document.getElementById('configList').innerHTML = '<dl>' +
        Object.entries(c).map(([k, v]) => '<dt>' + k + '</dt><dd>' + (v === true ? 'true' : v === false ? 'false' : String(v)) + '</dd>').join('') +
        '</dl>';
    }

    (function init() {
      if (!getToken()) return;
      fetch((API || '') + '/api/auth/me', { headers: { 'Authorization': 'Bearer ' + getToken() } })
        .then(r => r.json())
        .then(me => {
          if (me.id && me.isAdmin) {
            hide(document.getElementById('loginView'));
            show(document.getElementById('dashboardView'));
            document.getElementById('userEmail').textContent = me.email;
            loadTemplates(); loadUsers(); loadConfig();
          } else setToken('');
        })
        .catch(() => setToken(''));
    })();
  </script>
</body>
</html>
