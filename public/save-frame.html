<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>MIPO Save</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      background: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    /* Container 3:4 aspect ratio, white background */
    .save-container {
      width: 600px;
      height: 800px;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .result-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 32px;
      min-height: 0;
    }
    .result-area img {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
    }
    .mipo-text {
      width: 100%;
      padding: 24px 16px 32px;
      text-align: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #1D1D1F;
      letter-spacing: 3px;
    }
  </style>
</head>
<body>
  <div class="save-container">
    <div class="result-area">
      <img id="resultImg" src="" alt="Result">
    </div>
    <div class="mipo-text">MIPO</div>
  </div>
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var imageUrl = params.get('imageUrl') || params.get('img') || '';
      var img = document.getElementById('resultImg');
      if (imageUrl) {
        img.src = imageUrl;
        img.onerror = function() { img.style.background = '#f0f0f0'; };
      }
    })();
  </script>
</body>
</html>
