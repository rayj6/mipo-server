<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=2, user-scalable=yes">
  <title>Photo Strip - Template 2 (Film)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { min-height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F5F5F7;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 20px 16px;
    }

    /* Film strip: deep brown border with sprocket holes */
    .film-strip {
      width: 280px;
      min-height: 1180px;
      flex-shrink: 0;
      position: relative;
      display: flex;
      background: #5E3D2A;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      /* Subtle grainy texture */
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"), #5E3D2A;
    }

    /* Left rail with sprocket holes */
    .film-rail {
      width: 20px;
      flex-shrink: 0;
      position: relative;
      background: #5E3D2A;
    }
    .film-rail .sprocket {
      position: absolute;
      left: 2px;
      width: 12px;
      height: 14px;
      background: #E8E8E8;
      border-radius: 2px;
    }
    .film-rail-left .sprocket:nth-child(1) { top: 6%; }
    .film-rail-left .sprocket:nth-child(2) { top: 22%; }
    .film-rail-left .sprocket:nth-child(3) { top: 38%; }
    .film-rail-left .sprocket:nth-child(4) { top: 54%; }
    .film-rail-left .sprocket:nth-child(5) { top: 70%; }
    .film-rail-left .sprocket:nth-child(6) { top: 86%; }

    /* Right rail: sprocket holes + film markings */
    .film-rail-right {
      position: relative;
    }
    .film-rail-right .sprocket:nth-child(1) { top: 6%; }
    .film-rail-right .sprocket:nth-child(2) { top: 22%; }
    .film-rail-right .sprocket:nth-child(3) { top: 38%; }
    .film-rail-right .sprocket:nth-child(4) { top: 54%; }
    .film-rail-right .sprocket:nth-child(5) { top: 70%; }
    .film-rail-right .sprocket:nth-child(6) { top: 86%; }

    /* Triangular notches + "8A" vertically on right */
    .film-marking {
      position: absolute;
      right: 4px;
      width: 8px;
      height: 8px;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-bottom: 7px solid rgba(200,200,200,0.6);
      pointer-events: none;
    }
    .film-marking.m1 { top: 18%; }
    .film-marking.m2 { top: 46%; }
    .film-marking.m3 { top: 74%; }
    .film-label {
      position: absolute;
      right: 2px;
      font-size: 8px;
      color: rgba(180,180,180,0.9);
      letter-spacing: 0.5px;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transform: rotate(180deg);
      pointer-events: none;
    }
    .film-label.l1 { top: 20%; }
    .film-label.l2 { top: 48%; }
    .film-label.l3 { top: 76%; }
    .film-frame-num {
      position: absolute;
      left: 2px;
      font-size: 7px;
      color: rgba(160,160,160,0.7);
      pointer-events: none;
    }
    .film-rail-left .film-frame-num.f1 { top: 12%; }
    .film-rail-left .film-frame-num.f2 { top: 40%; }
    .film-rail-left .film-frame-num.f3 { top: 68%; }

    /* Center body: frames + footer */
    .film-body {
      flex: 1;
      min-width: 0;
      background: #E8E8E8;
    }

    /* Separator line between frames */
    .film-sep {
      height: 2px;
      background: #8B5D43;
      flex-shrink: 0;
    }

    /* Photo frame */
    .photo-slot {
      width: 100%;
      height: 336px;
      position: relative;
      overflow: hidden;
      background: #c4a574;
    }
    .photo-slot .photo-wrap {
      position: absolute;
      inset: 0;
    }
    .photo-slot .photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: sepia(0.65) contrast(1.05) brightness(0.92);
    }
    .photo-slot.hidden { display: none; }

    /* Footer: dark brown, white text */
    .footer {
      background: #4A3022;
      padding: 18px 12px 20px;
      text-align: center;
    }
    .footer .names {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }
    .footer .title {
      font-size: 13px;
      color: #B0B0B0;
      font-weight: 400;
    }
    .footer .date {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="film-strip">
    <div class="film-rail film-rail-left">
      <div class="sprocket"></div>
      <div class="sprocket"></div>
      <div class="sprocket"></div>
      <div class="sprocket"></div>
      <div class="sprocket"></div>
      <div class="sprocket"></div>
      <span class="film-frame-num f1">49</span>
      <span class="film-frame-num f2">50</span>
      <span class="film-frame-num f3">51</span>
    </div>

    <div class="film-body">
      <div class="photo-slot" id="slot1">
        <div class="photo-wrap"><img id="img1" src="" alt=""></div>
      </div>
      <div class="film-sep"></div>
      <div class="photo-slot" id="slot2">
        <div class="photo-wrap"><img id="img2" src="" alt=""></div>
      </div>
      <div class="film-sep"></div>
      <div class="photo-slot" id="slot3">
        <div class="photo-wrap"><img id="img3" src="" alt=""></div>
      </div>
      <div class="film-sep" id="sep4"></div>
      <div class="photo-slot hidden" id="slot4">
        <div class="photo-wrap"><img id="img4" src="" alt=""></div>
      </div>
      <div class="footer">
        <div class="names" id="namesEl"></div>
        <div class="title" id="titleEl"></div>
        <div class="date" id="dateEl"></div>
      </div>
    </div>

    <div class="film-rail film-rail-right">
      <div class="sprocket"></div>
      <div class="sprocket"></div>
      <div class="sprocket"></div>
      <div class="sprocket"></div>
      <div class="sprocket"></div>
      <div class="sprocket"></div>
      <span class="film-marking m1"></span>
      <span class="film-marking m2"></span>
      <span class="film-marking m3"></span>
      <span class="film-label l1">8A</span>
      <span class="film-label l2">8A</span>
      <span class="film-label l3">8A</span>
    </div>
  </div>

  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var slots = Math.min(4, Math.max(2, parseInt(params.get('slots') || '3', 10)));
      var stripHeights = { 2: 798, 3: 1148, 4: 1498 };
      var stripEl = document.querySelector('.film-strip');
      if (stripEl) stripEl.style.minHeight = (stripHeights[slots] || 1148) + 'px';

      var photo1 = params.get('photo1') || '';
      var photo2 = params.get('photo2') || '';
      var photo3 = params.get('photo3') || '';
      var photo4 = params.get('photo4') || '';
      var date = params.get('date') || '';
      var names = params.get('names') || '';
      var title = params.get('title') || '';

      var urls = [photo1, photo2, photo3, photo4];
      for (var i = 0; i < 4; i++) {
        var slot = document.getElementById('slot' + (i + 1));
        var img = document.getElementById('img' + (i + 1));
        if (i < slots && urls[i]) {
          slot.classList.remove('hidden');
          slot.style.display = 'block';
          img.src = urls[i];
          img.onerror = function() { this.style.background = '#c4a574'; };
        } else {
          slot.classList.add('hidden');
          slot.style.display = 'none';
        }
      }
      var sep4 = document.getElementById('sep4');
      if (sep4) sep4.style.display = slots >= 4 ? 'block' : 'none';

      document.getElementById('dateEl').textContent = date;
      var namesEl = document.getElementById('namesEl');
      if (names) {
        var parts = names.split(/\s+and\s+/i);
        if (parts.length >= 2) {
          namesEl.innerHTML = parts[0].trim() + ' <span style="font-weight:400;color:#B0B0B0;">&amp;</span> ' + parts.slice(1).join(' ').trim();
        } else {
          namesEl.textContent = names;
        }
      } else {
        namesEl.textContent = 'Wilkins';
      }
      document.getElementById('titleEl').textContent = title || '30th Birthday';
    })();
  </script>
</body>
</html>
