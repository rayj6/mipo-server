<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=2, user-scalable=yes">
  <title>Photo Strip - Prom Night</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { min-height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F5F5F7;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 20px 16px;
    }

    .strip {
      width: 280px;
      min-height: 1180px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      /* Dark purple base with glitter / shimmer */
      background: linear-gradient(165deg,
        #1a0a2e 0%,
        #2d1b4e 25%,
        #251540 50%,
        #1f0d35 75%,
        #160828 100%);
    }

    /* Glitter / sparkle overlay */
    .strip::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.06'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1;
    }

    /* Subtle bokeh / light specks */
    .strip::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle 8px at 15% 20%, rgba(180,120,220,0.25) 0%, transparent 100%),
        radial-gradient(circle 6px at 85% 35%, rgba(200,150,255,0.2) 0%, transparent 100%),
        radial-gradient(circle 10px at 50% 70%, rgba(160,100,220,0.2) 0%, transparent 100%),
        radial-gradient(circle 5px at 25% 85%, rgba(220,180,255,0.15) 0%, transparent 100%),
        radial-gradient(circle 7px at 75% 15%, rgba(190,140,240,0.18) 0%, transparent 100%);
      pointer-events: none;
      z-index: 1;
    }

    .strip-inner {
      position: relative;
      z-index: 2;
      padding: 20px 14px 20px;
    }

    .photo-slot {
      width: 252px;
      height: 336px;
      margin: 0 auto 12px;
      position: relative;
      border: 2px solid #0d0614;
      box-shadow: 0 2px 12px rgba(0,0,0,0.5);
    }
    .photo-slot:last-of-type { margin-bottom: 0; }

    .photo-slot .photo-wrap {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background: #1a1a1a;
    }

    .photo-slot .photo-wrap img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Footer: disco ball + text */
    .footer {
      position: relative;
      padding: 28px 14px 24px;
      text-align: center;
      min-height: 140px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
    }

    .disco-wrap {
      position: absolute;
      bottom: -20px;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 100px;
      z-index: 0;
    }

    .disco-ball {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: linear-gradient(135deg,
        #c0c0c0 0%,
        #e8e8e8 15%,
        #a0a0a0 30%,
        #d8d8d8 45%,
        #909090 60%,
        #e0e0e0 75%,
        #b0b0b0 100%);
      box-shadow:
        inset -8px -8px 16px rgba(0,0,0,0.3),
        inset 8px 8px 16px rgba(255,255,255,0.4),
        0 4px 20px rgba(0,0,0,0.4);
      position: relative;
      overflow: hidden;
    }

    .disco-ball::before {
      content: '';
      position: absolute;
      inset: 4px;
      background-image:
        linear-gradient(45deg, transparent 48%, rgba(255,255,255,0.3) 50%, transparent 52%),
        linear-gradient(-45deg, transparent 48%, rgba(255,255,255,0.2) 50%, transparent 52%),
        linear-gradient(90deg, transparent 48%, rgba(0,0,0,0.15) 50%, transparent 52%),
        linear-gradient(0deg, transparent 48%, rgba(0,0,0,0.1) 50%, transparent 52%);
      background-size: 20% 20%, 20% 20%, 15% 15%, 15% 15%;
      border-radius: 50%;
      pointer-events: none;
    }

    .footer-text {
      position: relative;
      z-index: 2;
    }

    .footer .subtitle {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 14px;
      font-weight: 300;
      color: rgba(255,255,255,0.95);
      letter-spacing: 0.12em;
      text-transform: lowercase;
      margin-bottom: 2px;
    }

    .footer .prom-title {
      font-family: 'Great Vibes', cursive;
      font-size: 48px;
      font-weight: 400;
      color: #ffffff;
      line-height: 1.1;
      letter-spacing: 0.02em;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .footer .date,
    .footer .names,
    .footer .title {
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      margin-top: 8px;
      letter-spacing: 0.04em;
    }

    .photo-slot.hidden { display: none; }
  </style>
</head>
<body>
  <div class="strip">
    <div class="strip-inner">
      <div class="photo-slot" id="slot1">
        <div class="photo-wrap"><img id="img1" src="" alt=""></div>
      </div>
      <div class="photo-slot" id="slot2">
        <div class="photo-wrap"><img id="img2" src="" alt=""></div>
      </div>
      <div class="photo-slot" id="slot3">
        <div class="photo-wrap"><img id="img3" src="" alt=""></div>
      </div>
      <div class="photo-slot hidden" id="slot4">
        <div class="photo-wrap"><img id="img4" src="" alt=""></div>
      </div>
      <div class="footer">
        <div class="disco-wrap">
          <div class="disco-ball"></div>
        </div>
        <div class="footer-text">
          <div class="subtitle" id="subtitleEl">the night of the</div>
          <div class="prom-title" id="promEl">Prom</div>
          <div class="date" id="dateEl"></div>
          <div class="names" id="namesEl"></div>
          <div class="title" id="titleEl"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var slots = Math.min(4, Math.max(1, parseInt(params.get('slots') || '3', 10)));
      var stripHeights = { 1: 462, 2: 798, 3: 1148, 4: 1498 };
      var stripEl = document.querySelector('.strip');
      if (stripEl) stripEl.style.minHeight = (stripHeights[slots] || 1148) + 'px';

      var photo1 = params.get('photo1') || '';
      var photo2 = params.get('photo2') || '';
      var photo3 = params.get('photo3') || '';
      var photo4 = params.get('photo4') || '';
      var date = params.get('date') || '';
      var names = params.get('names') || '';
      var title = params.get('title') || '';

      var urls = [photo1, photo2, photo3, photo4];
      for (var i = 0; i < 4; i++) {
        var slot = document.getElementById('slot' + (i + 1));
        var img = document.getElementById('img' + (i + 1));
        if (i < slots && urls[i]) {
          slot.classList.remove('hidden');
          img.src = urls[i];
          img.onerror = function() { this.style.background = '#333'; };
        } else {
          slot.classList.add('hidden');
        }
      }

      document.getElementById('subtitleEl').textContent = 'the night of the';
      document.getElementById('promEl').textContent = title || 'Prom';
      document.getElementById('dateEl').textContent = date;
      var namesEl = document.getElementById('namesEl');
      if (names) {
        var parts = names.split(/\s+and\s+/i);
        if (parts.length >= 2) {
          namesEl.innerHTML = parts[0].trim() + ' <span style="opacity:0.8">&amp;</span> ' + parts.slice(1).join(' ').trim();
        } else {
          namesEl.textContent = names;
        }
      }
      document.getElementById('titleEl').textContent = title || '';
    })();
  </script>
</body>
</html>
