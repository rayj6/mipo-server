<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=2, user-scalable=yes">
  <title>Photo Strip - Vintage Film</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { min-height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F5F5F7;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 20px 16px;
    }

    /* Light beige strip base */
    .strip {
      width: 280px;
      min-height: 1180px;
      flex-shrink: 0;
      background: #F0EEEA;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      padding: 16px 0 0;
    }

    /* Dark film strip with heavy distressed texture */
    .film-strip {
      position: relative;
      display: flex;
      width: 100%;
      min-height: 100%;
      background: #2a2826;
      background-image:
        url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='5' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.12'/%3E%3C/svg%3E"),
        url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='s'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.95' numOctaves='3'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3CfeComponentTransfer%3E%3CfeFuncA type='discrete' tableValues='0 0 0 1 0 0 1 0'/%3E%3C/feComponentTransfer%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23s)' opacity='0.08'/%3E%3C/svg%3E"),
        #2a2826;
    }

    /* Left rail: dark with rectangular perforations (light grey) */
    .film-rail {
      width: 18px;
      flex-shrink: 0;
      background: #1e1d1b;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 18 28' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='18' height='28' fill='%231e1d1b'/%3E%3Crect x='2' y='4' width='14' height='12' fill='%23d4d2ce'/%3E%3C/svg%3E");
      background-size: 18px 28px;
      position: relative;
    }
    .film-rail::after {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3CfeComponentTransfer%3E%3CfeFuncA type='linear' slope='0.15'/%3E%3C/feComponentTransfer%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)' opacity='0.5'/%3E%3C/svg%3E");
      background-size: 80px 80px;
      pointer-events: none;
      mix-blend-mode: overlay;
    }

    /* Center: slots + separators + footer */
    .film-body {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      background: #2a2826;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='5' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.1'/%3E%3C/svg%3E"), #2a2826;
    }

    .film-sep {
      height: 8px;
      flex-shrink: 0;
      background: #1e1d1b;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E"), #1e1d1b;
    }

    .photo-slot {
      width: 252px;
      height: 336px;
      margin: 0 auto;
      position: relative;
      flex-shrink: 0;
      background: #1e1d1b;
      border: 2px solid #1e1d1b;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06), 0 0 0 1px rgba(0,0,0,0.2);
    }
    .photo-slot .photo-wrap {
      position: absolute;
      inset: 3px;
      overflow: hidden;
      background: #e8e6e2;
    }
    .photo-slot .photo-wrap img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: grayscale(0.3) contrast(1.02) brightness(0.98);
    }
    .photo-slot.hidden { display: none; }

    .footer {
      flex-shrink: 0;
      padding: 18px 12px 20px;
      text-align: center;
      background: #1e1d1b;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E"), #1e1d1b;
    }
    .footer .brand {
      font-size: 11px;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.55);
    }
  </style>
</head>
<body>
  <div class="strip">
    <div class="film-strip">
      <div class="film-rail film-rail-left"></div>

      <div class="film-body">
        <div class="photo-slot" id="slot1">
          <div class="photo-wrap"><img id="img1" src="" alt=""></div>
        </div>
        <div class="film-sep"></div>
        <div class="photo-slot" id="slot2">
          <div class="photo-wrap"><img id="img2" src="" alt=""></div>
        </div>
        <div class="film-sep"></div>
        <div class="photo-slot" id="slot3">
          <div class="photo-wrap"><img id="img3" src="" alt=""></div>
        </div>
        <div class="film-sep" id="sep4"></div>
        <div class="photo-slot hidden" id="slot4">
          <div class="photo-wrap"><img id="img4" src="" alt=""></div>
        </div>
        <div class="footer">
          <div class="brand">MIPO</div>
        </div>
      </div>

      <div class="film-rail film-rail-right"></div>
    </div>
  </div>

  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var slots = Math.min(4, Math.max(1, parseInt(params.get('slots') || '3', 10)));
      var stripHeights = { 1: 462, 2: 798, 3: 1148, 4: 1498 };
      var stripEl = document.querySelector('.strip');
      if (stripEl) stripEl.style.minHeight = (stripHeights[slots] || 1148) + 'px';

      var photo1 = params.get('photo1') || '';
      var photo2 = params.get('photo2') || '';
      var photo3 = params.get('photo3') || '';
      var photo4 = params.get('photo4') || '';

      var urls = [photo1, photo2, photo3, photo4];
      for (var i = 0; i < 4; i++) {
        var slot = document.getElementById('slot' + (i + 1));
        var img = document.getElementById('img' + (i + 1));
        if (i < slots && urls[i]) {
          slot.classList.remove('hidden');
          img.src = urls[i];
          img.onerror = function() { this.style.background = '#ccc'; };
        } else {
          slot.classList.add('hidden');
        }
      }

      var sep4 = document.getElementById('sep4');
      if (sep4) sep4.style.display = slots >= 4 ? 'block' : 'none';
    })();
  </script>
</body>
</html>
