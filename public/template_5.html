<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=2, user-scalable=yes">
  <title>Photo Strip - Classic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { min-height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F5F5F7;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 20px 16px;
    }

    /* Light cream strip with consistent border on all sides */
    .strip {
      width: 280px;
      min-height: 1180px;
      flex-shrink: 0;
      background: #F9F7EF;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 18px 14px 24px;
    }

    .strip-inner {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .photo-slot {
      width: 252px;
      height: 336px;
      margin: 0 auto 14px;
      position: relative;
      overflow: hidden;
      background: #ebe8e0;
    }
    .photo-slot:last-of-type { margin-bottom: 0; }

    .photo-slot .photo-wrap {
      position: absolute;
      inset: 2px;
      overflow: hidden;
      background: #e5e2da;
    }

    .photo-slot .photo-wrap img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .footer {
      padding: 28px 10px 28px;
      text-align: center;
    }

    .footer .names {
      font-family: 'Libre Baskerville', 'Times New Roman', Georgia, serif;
      font-size: 18px;
      font-weight: 700;
      color: #5C5C5C;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      line-height: 1.4;
    }

    .footer .names .and {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 16px;
      font-weight: 400;
      font-style: italic;
      color: #8B4513;
      letter-spacing: 0.08em;
      margin: 0 0.35em;
      text-transform: none;
    }

    .footer .date {
      font-size: 11px;
      color: #8a8a8a;
      margin-top: 10px;
      letter-spacing: 0.06em;
    }

    .photo-slot.hidden { display: none; }
  </style>
</head>
<body>
  <div class="strip">
    <div class="strip-inner">
      <div class="photo-slot" id="slot1">
        <div class="photo-wrap"><img id="img1" src="" alt=""></div>
      </div>
      <div class="photo-slot" id="slot2">
        <div class="photo-wrap"><img id="img2" src="" alt=""></div>
      </div>
      <div class="photo-slot" id="slot3">
        <div class="photo-wrap"><img id="img3" src="" alt=""></div>
      </div>
      <div class="photo-slot hidden" id="slot4">
        <div class="photo-wrap"><img id="img4" src="" alt=""></div>
      </div>
      <div class="footer">
        <div class="names" id="namesEl"></div>
        <div class="date" id="dateEl"></div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var slots = Math.min(4, Math.max(1, parseInt(params.get('slots') || '3', 10)));
      var stripHeights = { 1: 462, 2: 798, 3: 1148, 4: 1498 };
      var stripEl = document.querySelector('.strip');
      if (stripEl) stripEl.style.minHeight = (stripHeights[slots] || 1148) + 'px';

      var photo1 = params.get('photo1') || '';
      var photo2 = params.get('photo2') || '';
      var photo3 = params.get('photo3') || '';
      var photo4 = params.get('photo4') || '';
      var date = params.get('date') || '';
      var names = params.get('names') || '';
      var title = params.get('title') || '';

      var urls = [photo1, photo2, photo3, photo4];
      for (var i = 0; i < 4; i++) {
        var slot = document.getElementById('slot' + (i + 1));
        var img = document.getElementById('img' + (i + 1));
        if (i < slots && urls[i]) {
          slot.classList.remove('hidden');
          img.src = urls[i];
          img.onerror = function() { this.style.background = '#ddd'; };
        } else {
          slot.classList.add('hidden');
        }
      }

      document.getElementById('dateEl').textContent = date;
      var namesEl = document.getElementById('namesEl');
      if (names) {
        var parts = names.split(/\s+and\s+/i);
        if (parts.length >= 2) {
          namesEl.innerHTML = parts[0].trim().toUpperCase() + ' <span class="and">&amp;</span> ' + parts.slice(1).join(' ').trim().toUpperCase();
        } else {
          namesEl.textContent = names.toUpperCase();
        }
      } else {
        namesEl.textContent = '';
      }
    })();
  </script>
</body>
</html>
